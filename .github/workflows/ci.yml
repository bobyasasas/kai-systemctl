name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build archives
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -ldflags "-X main.version=${version}" -o dist/kai-systemctl ./cmd/kai-systemctl
              tar -C dist -czf dist/kai-systemctl_${os}_${arch}.tar.gz kai-systemctl
              rm dist/kai-systemctl
            done
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
